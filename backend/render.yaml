services:
  - type: web
    name: tg1600-sms-platform
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: COUNTRY_CODE
        value: "591"
